# =============================================================================
# GitHub Actions: 自动构建并发布到 Release
# 触发条件: 推送 tag (v*)
# =============================================================================

name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要写入权限来创建 Release

jobs:
  # =========================================================================
  # Job 1: 构建 macOS DMG
  # =========================================================================
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pyinstaller backend.spec --clean --noconfirm

      # Smoke test: 验证打包后的后端能正常启动
      - name: Smoke test backend (basic)
        run: |
          cd backend/dist/backend
          # 启动后端
          ./backend &
          BACKEND_PID=$!
          # 等待 5 秒
          sleep 5
          # 检查进程是否还在
          if kill -0 $BACKEND_PID 2>/dev/null; then
            echo "✅ Backend smoke test passed"
            kill $BACKEND_PID
            wait $BACKEND_PID 2>/dev/null
          else
            echo "❌ Backend smoke test failed - process exited unexpectedly"
            wait $BACKEND_PID
            exit 1
          fi

      # Smoke test: 端口碰撞场景
      - name: Smoke test backend (port collision)
        run: bash scripts/smoke-test-backend.sh

      - name: Build DMG
        run: |
          npx electron-builder --mac --config --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test: Electron 完整启动链路
      - name: Smoke test Electron (integration)
        run: bash scripts/smoke-test-electron.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error

  # =========================================================================
  # Job 2: 构建 Windows EXE
  # =========================================================================
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pyinstaller backend.spec --clean --noconfirm

      # Smoke test: 验证打包后的后端能正常启动
      - name: Smoke test backend (basic)
        run: |
          cd backend/dist/backend
          # 启动后端
          $process = Start-Process -FilePath ".\backend.exe" -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          # 检查进程是否还在运行
          if (!$process.HasExited) {
            Write-Host "✅ Backend smoke test passed"
            Stop-Process -Id $process.Id -Force
          } else {
            Write-Host "❌ Backend smoke test failed - exit code: $($process.ExitCode)"
            exit 1
          }
        shell: pwsh

      # Smoke test: 端口碰撞场景
      - name: Smoke test backend (port collision)
        run: powershell -ExecutionPolicy Bypass -File scripts\smoke-test-backend.ps1
        shell: cmd

      - name: Build EXE
        run: |
          npx electron-builder --win --config --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test: Electron 完整启动链路
      - name: Smoke test Electron (integration)
        run: powershell -ExecutionPolicy Bypass -File scripts\smoke-test-electron.ps1
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe
          if-no-files-found: error

  # =========================================================================
  # Job 3: 创建 GitHub Release
  # =========================================================================
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: artifacts/win

      - name: List artifacts
        run: |
          echo "=== macOS ==="
          ls -la artifacts/mac/
          echo "=== Windows ==="
          ls -la artifacts/win/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 牙科设备推荐Agent ${{ github.ref_name }}
          body: |
            ## 牙科设备推荐Agent ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `*.dmg` | 双击安装 |
            | Windows | `*.exe` | 双击安装 |

            ### 更新内容
            - （请在此处填写更新内容）

            ### 安装说明
            - **macOS**: 双击 .dmg 文件，拖拽到 Applications
            - **Windows**: 双击 .exe 文件，按向导安装
          files: |
            artifacts/mac/*
            artifacts/win/*
          draft: true  # 先创建草稿，手动确认后发布
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
